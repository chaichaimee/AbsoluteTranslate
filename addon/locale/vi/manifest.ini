summary = "AbsoluteTranslate"
description = """Nâng tầm góc nhìn của bạn với các bản dịch mượt mà, nhanh như chớp ngay trong NVDA. Trải nghiệm sự rõ ràng tuyệt đối và không rào cản trên mọi ngôn ngữ.
Phím nóng:
ALT+Windows+T
Nhấn một lần: Dịch văn bản được chọn
Nhấn hai lần: Dịch lời nói cuối cùng
Nhấn ba lần: Mở cài đặt Absolute Translate"""
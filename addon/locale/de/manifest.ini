summary = "AbsoluteTranslate"
description = """Erweitern Sie Ihre Perspektive mit nahtlosen, blitzschnellen Übersetzungen direkt in NVDA. Erleben Sie absolute Klarheit und null Reibung in jeder Sprache.
Hotkeys:
ALT+Windows+T
Einmal drücken: Übersetzt markierten Text
Zweimal drücken: Übersetzt die letzte Sprachausgabe
Dreimal drücken: Öffnet die Absolute Translate Einstellungen"""
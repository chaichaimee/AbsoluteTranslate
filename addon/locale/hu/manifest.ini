summary = "AbsoluteTranslate"
description = """Emelje új szintre perspektíváját zökkenőmentes, villámgyors fordításokkal közvetlenül az NVDA-ban. Tapasztalja meg az abszolút egyértelműséget bármely nyelven.
Gyorsbillentyűk:
ALT+Windows+T
Egyszeri gombnyomás: Kijelölt szöveg fordítása
Dupla gombnyomás: Utolsó beszéd fordítása
Tripla gombnyomás: Absolute Translate beállítások megnyitása"""